name: CI/CD - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOKPLOY_APP_ID: BcKwepZNDDxzxQkpKlZQN

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Đăng nhập GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lấy metadata image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/auth/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/auth/sign-up
            NEXT_PUBLIC_SENTRY_DISABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Thông báo Telegram - Build thất bại
        if: failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *BUILD THẤT BẠI*
            Quá trình build Docker image gặp lỗi!

            🏷 *Dự án:* `${{ github.repository }}`
            🌿 *Nhánh:* `${{ github.ref_name }}`
            👤 *Thực hiện bởi:* `${{ github.actor }}`
            🕐 *Thời gian:* `${{ github.event.head_commit.timestamp }}`
            💬 *Commit:* `${{ github.event.head_commit.message }}`
            🔗 [Xem chi tiết](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  deploy:
    name: Deploy lên Dokploy
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Cập nhật image trên Dokploy
        run: |
          IMAGE_TAG="ghcr.io/${{ github.repository }}:$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Deploying image: $IMAGE_TAG"

          # Cập nhật sourceType sang docker image
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.update" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"applicationId\": \"${{ env.DOKPLOY_APP_ID }}\",
              \"sourceType\": \"docker\",
              \"dockerImage\": \"$IMAGE_TAG\",
              \"username\": \"${{ github.actor }}\",
              \"password\": \"${{ secrets.GITHUB_TOKEN }}\"
            }"

      - name: Trigger deploy trên Dokploy
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\": \"${{ env.DOKPLOY_APP_ID }}\"}")
          echo "Deploy response: $RESPONSE"

      - name: Chờ deploy hoàn tất
        run: |
          echo "Đang chờ Dokploy deploy..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -s "${{ secrets.DOKPLOY_URL }}/api/application.one?applicationId=${{ env.DOKPLOY_APP_ID }}" \
              -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
              | grep -o '"applicationStatus":"[^"]*"' | cut -d'"' -f4)
            echo "Lần $i - Trạng thái: $STATUS"
            if [ "$STATUS" = "running" ]; then
              echo "DEPLOY_STATUS=success" >> $GITHUB_ENV
              break
            elif [ "$STATUS" = "error" ]; then
              echo "DEPLOY_STATUS=failure" >> $GITHUB_ENV
              break
            fi
            sleep 15
          done
          if [ -z "$DEPLOY_STATUS" ]; then
            echo "DEPLOY_STATUS=failure" >> $GITHUB_ENV
          fi

      - name: Thông báo Telegram - Deploy thành công
        if: env.DEPLOY_STATUS == 'success'
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *TRIỂN KHAI THÀNH CÔNG*
            Ứng dụng đã được cập nhật lên production! 🚀

            🏷 *Dự án:* `${{ github.repository }}`
            🌿 *Nhánh:* `${{ github.ref_name }}`
            👤 *Thực hiện bởi:* `${{ github.actor }}`
            💬 *Commit:* `${{ github.event.head_commit.message }}`
            🔗 [Xem ứng dụng](https://warehouse-cba59n-6a2aa1-103-72-98-129.sslip.io)
            📋 [Xem workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Thông báo Telegram - Deploy thất bại
        if: env.DEPLOY_STATUS == 'failure' || failure()
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *TRIỂN KHAI THẤT BẠI*
            Deploy lên Dokploy gặp lỗi, vui lòng kiểm tra ngay!

            🏷 *Dự án:* `${{ github.repository }}`
            🌿 *Nhánh:* `${{ github.ref_name }}`
            👤 *Thực hiện bởi:* `${{ github.actor }}`
            💬 *Commit:* `${{ github.event.head_commit.message }}`
            🔗 [Xem logs Dokploy](https://dokploy.neooi.com)
            📋 [Xem workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

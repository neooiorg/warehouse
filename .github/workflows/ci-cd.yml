name: CI/CD - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOKPLOY_APP_ID: BcKwepZNDDxzxQkpKlZQN
  DOKPLOY_URL: https://dokploy.neooi.com

jobs:
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL secret not set — skipping migration (run manually)"
            exit 0
          fi
          npx drizzle-kit migrate

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/auth/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/auth/sign-up
            NEXT_PUBLIC_SENTRY_DISABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Update Dokploy image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          echo "Deploying image: $IMAGE_TAG"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ env.DOKPLOY_URL }}/api/application.update" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ env.DOKPLOY_APP_ID }}\",\"sourceType\":\"docker\",\"dockerImage\":\"$IMAGE_TAG\",\"registryUrl\":\"ghcr.io\",\"username\":\"${{ github.actor }}\",\"password\":\"${{ secrets.GHCR_TOKEN }}\"}")
          echo "Response: $RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "API error: HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Trigger deploy on Dokploy
        run: |
          RESPONSE=$(curl -sf -X POST "${{ env.DOKPLOY_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ env.DOKPLOY_APP_ID }}\"}")
          echo "Deploy triggered: $RESPONSE"

      - name: Wait for deployment
        run: |
          echo "Waiting 40s for Dokploy to start container..."
          sleep 40
          for i in $(seq 1 15); do
            BODY=$(curl -sf "${{ env.DOKPLOY_URL }}/api/application.one?applicationId=${{ env.DOKPLOY_APP_ID }}" \
              -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" || echo '{}')
            STATUS=$(echo "$BODY" | grep -o '"applicationStatus":"[^"]*"' | cut -d'"' -f4)
            echo "Attempt $i/15 — Status: ${STATUS:-unknown}"
            if [ "$STATUS" = "running" ] || [ "$STATUS" = "done" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "error" ]; then
              echo "❌ Deployment failed on Dokploy!"
              exit 1
            fi
            sleep 20
          done
          echo "⏱️ Deployment timed out after ~5 min (may still be starting)"
          exit 1

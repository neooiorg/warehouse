name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/auth/sign-in
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/auth/sign-up
            NEXT_PUBLIC_SENTRY_DISABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Dokploy image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/application.update" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"BcKwepZNDDxzxQkpKlZQN\",\"dockerImage\":\"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}\"}"

      - name: Trigger Dokploy redeploy
        run: |
          curl -s -X POST "${{ secrets.DOKPLOY_URL }}/api/deploy.deployWithToken" \
            -H "Content-Type: application/json" \
            -d '{"token":"8yAz7JhrT1zxMnMIT9dQy"}'
